<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeoPix Bank</title><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#0b0f1a;color:#fff}
.auth, .app{display:flex;justify-content:center;align-items:center;height:100vh}
.auth-box{background:#111827;padding:25px;border-radius:12px;width:320px}
.auth-box input{width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:none}
.auth-box button{width:100%;padding:10px;background:#22c55e;border:none;border-radius:8px;cursor:pointer}
.link{margin-top:10px;text-align:center;cursor:pointer;color:#9ca3af}
.app{display:none;flex-direction:column;height:auto}
.header{background:#111827;padding:15px;display:flex;justify-content:space-between}
.balance{margin:20px;padding:20px;background:#22c55e;color:#000;border-radius:12px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:20px}
.card{background:#111827;padding:15px;border-radius:10px;text-align:center;cursor:pointer}
.history{padding:20px}
.profile{padding:20px;background:#111827;margin:20px;border-radius:12px}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;display:none;background:rgba(0,0,0,0.8);justify-content:center;align-items:center}
.modal-box{background:#111827;padding:20px;border-radius:10px;text-align:center}
</style></head><body><div class="auth" id="auth">
<div class="auth-box" id="loginBox">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
<div class="link" onclick="mostrarCadastro()">Criar conta</div>
</div><div class="auth-box" id="cadastroBox" style="display:none">
<h2>Cadastro</h2>
<input id="nome" placeholder="Nome">
<input id="emailCad" placeholder="Email">
<input id="cpf" placeholder="CPF">
<input id="telefone" placeholder="Telefone">
<input id="senhaCad" type="password" placeholder="Senha">
<button onclick="cadastrar()">Cadastrar</button>
<div class="link" onclick="voltarLogin()">Voltar</div>
</div>
</div><div class="app" id="app">
<div class="header">
<h3>NeoPix</h3>
<button onclick="logout()">Sair</button>
</div><div class="balance">
<h4>Saldo</h4>
<h2 id="saldo">R$ 0</h2>
</div><div class="grid" id="grid"></div><div class="history">
<h3>Histórico</h3>
<div id="historico"></div>
</div><div class="profile" id="perfil"></div>
</div><div class="modal" id="modal">
<div class="modal-box">
<h3 id="valor"></h3>
<button onclick="simular()">Simular pagamento</button>
<button onclick="fechar()">Fechar</button>
<p id="msg"></p>
</div>
</div><script>
let usuarioAtual;
let saldo=0;

function mostrarCadastro(){
loginBox.style.display='none';
cadastroBox.style.display='block';
}

function voltarLogin(){
cadastroBox.style.display='none';
loginBox.style.display='block';
}

function cadastrar(){
let user={
nome:nome.value,
email:emailCad.value,
cpf:cpf.value,
telefone:telefone.value,
senha:senhaCad.value,
saldo:1000,
hist:[]
};

localStorage.setItem(user.email,JSON.stringify(user));
alert('Conta criada!');
voltarLogin();
}

function login(){
let emailL=email.value;
let senhaL=senha.value;
let user=JSON.parse(localStorage.getItem(emailL));

if(user && user.senha===senhaL){
usuarioAtual=user;
abrirApp();
}else alert('Login inválido');
}

function abrirApp(){
auth.style.display='none';
app.style.display='block';
atualizar();
}

function atualizar(){
saldo=usuarioAtual.saldo;
saldoEl.innerText='R$ '+saldo;

perfil.innerHTML=`
<h3>Perfil</h3>
<p>Nome: ${usuarioAtual.nome}</p>
<p>Email: ${usuarioAtual.email}</p>
<p>CPF: ${usuarioAtual.cpf}</p>
<p>Telefone: ${usuarioAtual.telefone}</p>
`;

historico.innerHTML='';
usuarioAtual.hist.slice().reverse().forEach(h=>{
historico.innerHTML+=`<div>${h}</div>`;
});
}

function salvar(){
localStorage.setItem(usuarioAtual.email,JSON.stringify(usuarioAtual));
atualizar();
}

const valores=[100,500,1000,5000];
valores.forEach(v=>{
let d=document.createElement('div');
d.className='card';
d.innerText='R$ '+v;
d.onclick=()=>abrir(v);
grid.appendChild(d);
});

function abrir(v){
modal.style.display='flex';
valor.innerText='Depositar R$ '+v;
window.valorAtual=v;
}

function fechar(){modal.style.display='none'}

function simular(){
msg.innerText='Processando...';
setTimeout(()=>{
usuarioAtual.saldo+=valorAtual;
usuarioAtual.hist.push('Depósito R$ '+valorAtual);
salvar();
fechar();
msg.innerText='';
},1500);
}

function logout(){location.reload()}
</script></body>
</html>
