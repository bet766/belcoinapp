<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeoPix Bank</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body {
    background:#0b0f1a;
    color:#fff;
}

/* LOGIN */
.auth {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.auth-box {
    background:#111827;
    padding:30px;
    border-radius:12px;
    width:300px;
}

.auth-box h2 {
    margin-bottom:20px;
}

.auth-box input {
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border:none;
    border-radius:8px;
}

.auth-box button {
    width:100%;
    padding:10px;
    background:#22c55e;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.link {
    margin-top:10px;
    text-align:center;
    cursor:pointer;
    color:#9ca3af;
}

/* APP */
.app { display:none; }

.header {
    background:#111827;
    padding:15px;
    display:flex;
    justify-content:space-between;
}

.balance {
    padding:20px;
    background:linear-gradient(135deg,#22c55e,#4ade80);
    margin:20px;
    border-radius:12px;
    color:#000;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:15px;
    padding:20px;
}

.card {
    background:#111827;
    padding:20px;
    border-radius:12px;
    text-align:center;
    cursor:pointer;
    transition:.3s;
}

.card:hover {
    transform:translateY(-5px);
    border:1px solid #22c55e;
}

/* HISTÓRICO */
.history {
    padding:20px;
}

.history-item {
    background:#111827;
    padding:10px;
    margin-bottom:10px;
    border-radius:8px;
}

/* MODAL */
.modal {
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    display:none;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}

.modal-box {
    background:#111827;
    padding:30px;
    border-radius:12px;
    text-align:center;
}

.modal-box img { width:200px; }

.support {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#22c55e;
    width:50px;height:50px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#000;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="auth" id="auth">
    <div class="auth-box">
        <h2>NeoPix</h2>
        <input type="text" id="user" placeholder="Usuário">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="login()">Entrar</button>
        <div class="link" onclick="register()">Criar conta</div>
    </div>
</div>

<!-- APP -->
<div class="app" id="app">

<div class="header">
    <h3>NeoPix</h3>
    <button onclick="logout()">Sair</button>
</div>

<div class="balance">
    <h4>Saldo</h4>
    <h2 id="saldo">R$ 0</h2>
</div>

<div style="padding:20px;">
    <input id="cupom" placeholder="Cupom" style="padding:8px;border-radius:8px;border:none;">
    <button onclick="usarCupom()" style="padding:8px;border:none;background:#22c55e;border-radius:8px;">OK</button>
</div>

<div class="grid" id="grid"></div>

<div class="history">
    <h3>Histórico</h3>
    <div id="history"></div>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-box">
        <h3 id="valor"></h3>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=PIX">
        <br><br>
        <button onclick="simular()">Já paguei</button>
        <button onclick="fechar()">Fechar</button>
        <p id="msg"></p>
    </div>
</div>

<div class="support" onclick="alert('Suporte: suporte@neopix.com')">?</div>

<script>

// LOGIN
function login(){
    let u = user.value;
    let p = pass.value;

    if(localStorage.getItem(u) === p){
        iniciar(u);
    } else {
        alert("Usuário não encontrado");
    }
}

function register(){
    let u = user.value;
    let p = pass.value;

    localStorage.setItem(u,p);
    localStorage.setItem(u+"_saldo",1000);
    localStorage.setItem(u+"_hist","[]");

    alert("Conta criada!");
}

function iniciar(u){
    window.usuario = u;
    document.getElementById("auth").style.display="none";
    document.getElementById("app").style.display="block";
    carregar();
}

function logout(){
    location.reload();
}

// SALDO
function carregar(){
    saldo = Number(localStorage.getItem(usuario+"_saldo"));
    atualizarSaldo();
    carregarHistorico();
}

function atualizarSaldo(){
    saldoEl.innerText = "R$ " + saldo.toLocaleString();
}

// CUPOM
const cupons = {VIP100:100,PIX500:500};

function usarCupom(){
    let c = cupom.value.toUpperCase();
    if(cupons[c]){
        saldo += cupons[c];
        salvar("Cupom +" + cupons[c]);
    } else alert("Inválido");
}

// HISTÓRICO
function salvar(txt){
    let hist = JSON.parse(localStorage.getItem(usuario+"_hist"));
    hist.push(txt);
    localStorage.setItem(usuario+"_hist",JSON.stringify(hist));
    localStorage.setItem(usuario+"_saldo",saldo);
    carregar();
}

function carregarHistorico(){
    let hist = JSON.parse(localStorage.getItem(usuario+"_hist"));
    history.innerHTML="";
    hist.reverse().forEach(h=>{
        history.innerHTML += `<div class="history-item">${h}</div>`;
    });
}

// INVESTIMENTOS
const valores=[500,1000,5000,10000,50000,100000];

valores.forEach(v=>{
    let div=document.createElement("div");
    div.className="card";
    div.innerHTML=`R$ ${v}`;
    div.onclick=()=>abrir(v);
    grid.appendChild(div);
});

function abrir(v){
    modal.style.display="flex";
    valor.innerText="R$ "+v;
}

function fechar(){ modal.style.display="none"; }

function simular(){
    msg.innerText="Processando...";
    setTimeout(()=>{
        msg.innerText="Se não atualizar, contate suporte.";
    },1500);
}

</script>

</body>
</html>
